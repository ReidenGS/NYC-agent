services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nyc_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nyc_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nyc_agent_password}
      POSTGRES_DB: ${POSTGRES_DB:-nyc_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nyc_agent_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nyc_agent} -d ${POSTGRES_DB:-nyc_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nyc_agent_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - nyc_agent_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-sync-service:
    build:
      context: ./services/data-sync-service
    container_name: nyc_agent_data_sync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # data-sync-service is sync code (psycopg). Prefer DATABASE_URL_SYNC_DOCKER;
      # fall back to legacy DATABASE_URL_DOCKER, then to a built-in psycopg default.
      DATABASE_URL_SYNC_DOCKER: ${DATABASE_URL_SYNC_DOCKER:-postgresql+psycopg://nyc_agent:nyc_agent_password@postgres:5432/nyc_agent}
      DATABASE_URL_DOCKER: ${DATABASE_URL_DOCKER:-postgresql+psycopg://nyc_agent:nyc_agent_password@postgres:5432/nyc_agent}
      SYNC_ENABLE_SCHEDULED_JOBS: ${SYNC_ENABLE_SCHEDULED_JOBS:-false}
      SYNC_BOOTSTRAP_AREAS: ${SYNC_BOOTSTRAP_AREAS:-}
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
      SOCRATA_PAGE_SIZE: ${SOCRATA_PAGE_SIZE:-1000}
      SOCRATA_MAX_ROWS_PER_JOB: ${SOCRATA_MAX_ROWS_PER_JOB:-50000}
      RENTCAST_SYNC_ENABLED: ${RENTCAST_SYNC_ENABLED:-false}
      RENTCAST_API_KEY: ${RENTCAST_API_KEY:-}
      HUD_USER_API_TOKEN: ${HUD_USER_API_TOKEN:-}
      RENTCAST_MAX_CALLS_PER_RUN: ${RENTCAST_MAX_CALLS_PER_RUN:-5}
      RENTCAST_MAX_CALLS_PER_MONTH: ${RENTCAST_MAX_CALLS_PER_MONTH:-50}
      OVERPASS_MAX_REQUESTS_PER_RUN: ${OVERPASS_MAX_REQUESTS_PER_RUN:-10}
      OVERPASS_SLEEP_SECONDS: ${OVERPASS_SLEEP_SECONDS:-3}
      MAP_LAYER_PREGENERATE_FOR_SEED: ${MAP_LAYER_PREGENERATE_FOR_SEED:-true}
      MTA_BUS_STATIC_FEED_URLS: ${MTA_BUS_STATIC_FEED_URLS:-}
    ports:
      - "${DATA_SYNC_PORT:-8030}:8030"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8030/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-profile:
    build:
      context: .
      dockerfile: ./services/mcp-profile/Dockerfile
    container_name: nyc_agent_mcp_profile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      PROFILE_STORE_BACKEND: ${PROFILE_STORE_BACKEND:-postgres}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC_DOCKER:-postgresql+psycopg://nyc_agent:nyc_agent_password@postgres:5432/nyc_agent}
      PROFILE_STATEMENT_TIMEOUT_MS: ${PROFILE_STATEMENT_TIMEOUT_MS:-3000}
    ports:
      - "${MCP_PROFILE_PORT:-8026}:8026"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8026/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  profile-agent:
    build:
      context: .
      dockerfile: ./services/profile-agent/Dockerfile
    container_name: nyc_agent_profile_agent
    restart: unless-stopped
    depends_on:
      mcp-profile:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      MCP_PROFILE_URL: ${MCP_PROFILE_URL_DOCKER:-http://mcp-profile:8026}
    ports:
      - "${PROFILE_AGENT_PORT:-8014}:8014"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8014/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-sql:
    build:
      context: .
      dockerfile: ./services/mcp-sql/Dockerfile
    container_name: nyc_agent_mcp_sql
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      DATABASE_URL_SQL: ${DATABASE_URL_SQL_DOCKER:-postgresql+psycopg://nyc_agent:nyc_agent_password@postgres:5432/nyc_agent}
      SQL_STATEMENT_TIMEOUT_MS: ${SQL_STATEMENT_TIMEOUT_MS:-3000}
    ports:
      - "${MCP_SQL_PORT:-8020}:8020"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8020/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-safety:
    build:
      context: .
      dockerfile: ./services/mcp-domain-sql/Dockerfile
    container_name: nyc_agent_mcp_safety
    restart: unless-stopped
    depends_on:
      mcp-sql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      SERVICE_NAME: mcp-safety
      SQL_DOMAIN: safety
      MCP_SQL_URL: ${MCP_SQL_URL_DOCKER:-http://mcp-sql:8020}
    ports:
      - "${MCP_SAFETY_PORT:-8022}:8022"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8022/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-amenity:
    build:
      context: .
      dockerfile: ./services/mcp-domain-sql/Dockerfile
    container_name: nyc_agent_mcp_amenity
    restart: unless-stopped
    depends_on:
      mcp-sql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      SERVICE_NAME: mcp-amenity
      SQL_DOMAIN: amenity
      MCP_SQL_URL: ${MCP_SQL_URL_DOCKER:-http://mcp-sql:8020}
    ports:
      - "${MCP_AMENITY_PORT:-8023}:8022"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8022/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-entertainment:
    build:
      context: .
      dockerfile: ./services/mcp-domain-sql/Dockerfile
    container_name: nyc_agent_mcp_entertainment
    restart: unless-stopped
    depends_on:
      mcp-sql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      SERVICE_NAME: mcp-entertainment
      SQL_DOMAIN: entertainment
      MCP_SQL_URL: ${MCP_SQL_URL_DOCKER:-http://mcp-sql:8020}
    ports:
      - "${MCP_ENTERTAINMENT_PORT:-8024}:8022"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8022/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  housing-agent:
    build:
      context: .
      dockerfile: ./services/housing-agent/Dockerfile
    container_name: nyc_agent_housing_agent
    restart: unless-stopped
    depends_on:
      mcp-sql:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      MCP_SQL_URL: ${MCP_SQL_URL_DOCKER:-http://mcp-sql:8020}
      USE_LLM_SQL_PLANNER: ${USE_LLM_SQL_PLANNER:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      HOUSING_AGENT_SQL_MODEL: ${HOUSING_AGENT_SQL_MODEL:-gpt-4o}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-20}
    ports:
      - "${HOUSING_AGENT_PORT:-8011}:8011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8011/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  neighborhood-agent:
    build:
      context: .
      dockerfile: ./services/neighborhood-agent/Dockerfile
    container_name: nyc_agent_neighborhood_agent
    restart: unless-stopped
    depends_on:
      mcp-safety:
        condition: service_healthy
      mcp-amenity:
        condition: service_healthy
      mcp-entertainment:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      MCP_SQL_URL: ${MCP_SQL_URL_DOCKER:-http://mcp-sql:8020}
      MCP_SAFETY_URL: ${MCP_SAFETY_URL_DOCKER:-http://mcp-safety:8022}
      MCP_AMENITY_URL: ${MCP_AMENITY_URL_DOCKER:-http://mcp-amenity:8022}
      MCP_ENTERTAINMENT_URL: ${MCP_ENTERTAINMENT_URL_DOCKER:-http://mcp-entertainment:8022}
      USE_LLM_SQL_PLANNER: ${USE_LLM_SQL_PLANNER:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      NEIGHBORHOOD_AGENT_SQL_MODEL: ${NEIGHBORHOOD_AGENT_SQL_MODEL:-gpt-4o}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-20}
    ports:
      - "${NEIGHBORHOOD_AGENT_PORT:-8012}:8012"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8012/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-transit:
    build:
      context: .
      dockerfile: ./services/mcp-transit/Dockerfile
    container_name: nyc_agent_mcp_transit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC_DOCKER:-postgresql+psycopg://nyc_agent:nyc_agent_password@postgres:5432/nyc_agent}
      TRANSIT_STATEMENT_TIMEOUT_MS: ${TRANSIT_STATEMENT_TIMEOUT_MS:-3000}
    ports:
      - "${MCP_TRANSIT_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8025/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  transit-agent:
    build:
      context: .
      dockerfile: ./services/transit-agent/Dockerfile
    container_name: nyc_agent_transit_agent
    restart: unless-stopped
    depends_on:
      mcp-transit:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      MCP_TRANSIT_URL: ${MCP_TRANSIT_URL_DOCKER:-http://mcp-transit:8025}
    ports:
      - "${TRANSIT_AGENT_PORT:-8013}:8013"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8013/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-weather:
    build:
      context: .
      dockerfile: ./services/mcp-weather/Dockerfile
    container_name: nyc_agent_mcp_weather
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/shared
      NWS_USER_AGENT: ${NWS_USER_AGENT:-NYC-agent-demo/0.1 (contact@example.com)}
    ports:
      - "${MCP_WEATHER_PORT:-8027}:8027"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8027/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  weather-agent:
    build:
      context: .
      dockerfile: ./services/weather-agent/Dockerfile
    container_name: nyc_agent_weather_agent
    restart: unless-stopped
    depends_on:
      mcp-weather:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      MCP_WEATHER_URL: ${MCP_WEATHER_URL_DOCKER:-http://mcp-weather:8027}
    ports:
      - "${WEATHER_AGENT_PORT:-8015}:8015"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8015/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator-agent:
    build:
      context: .
      dockerfile: ./services/orchestrator-agent/Dockerfile
    container_name: nyc_agent_orchestrator_agent
    restart: unless-stopped
    depends_on:
      profile-agent:
        condition: service_healthy
      housing-agent:
        condition: service_healthy
      neighborhood-agent:
        condition: service_healthy
      transit-agent:
        condition: service_healthy
      weather-agent:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/shared
      PROFILE_AGENT_URL: ${PROFILE_AGENT_URL_DOCKER:-http://profile-agent:8014}
      HOUSING_AGENT_URL: ${HOUSING_AGENT_URL_DOCKER:-http://housing-agent:8011}
      NEIGHBORHOOD_AGENT_URL: ${NEIGHBORHOOD_AGENT_URL_DOCKER:-http://neighborhood-agent:8012}
      TRANSIT_AGENT_URL: ${TRANSIT_AGENT_URL_DOCKER:-http://transit-agent:8013}
      WEATHER_AGENT_URL: ${WEATHER_AGENT_URL_DOCKER:-http://weather-agent:8015}
    ports:
      - "${ORCHESTRATOR_AGENT_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8010/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5


  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: nyc_agent_api_gateway
    restart: unless-stopped
    depends_on:
      data-sync-service:
        condition: service_healthy
      orchestrator-agent:
        condition: service_healthy
    environment:
      USE_REMOTE_ORCHESTRATOR: ${USE_REMOTE_ORCHESTRATOR:-true}
      ORCHESTRATOR_AGENT_URL: ${ORCHESTRATOR_AGENT_URL_DOCKER:-http://orchestrator-agent:8010}
      DATA_SYNC_BASE_URL: ${DATA_SYNC_BASE_URL_DOCKER:-http://data-sync-service:8030}
      CORS_ORIGINS: ${API_GATEWAY_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nyc_agent_pgdata:
  nyc_agent_redisdata:
