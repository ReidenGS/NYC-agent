services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nyc_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nyc_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nyc_agent_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nyc_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nyc_agent_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nyc_agent} -d ${POSTGRES_DB:-nyc_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nyc_agent_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - nyc_agent_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nyc_agent_pgdata:
  nyc_agent_redisdata:
